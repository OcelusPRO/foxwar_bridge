<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Foxwar Bridge</title>
  <style>
    /* ── Tailwind design tokens (neutral + amber, Inter) ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Inter, system-ui, -apple-system, 'Segoe UI', sans-serif;
      font-size: 13px;
      line-height: 1.5;
      background: #0a0a0a;
      color: #f5f5f5;
      min-height: 100vh;
      padding: 12px;
      user-select: none;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 12px;
      border-bottom: 1px solid #262626;
      margin-bottom: 12px;
    }
    .brand-name {
      display: flex;
      flex-direction: column;
      line-height: 1;
    }
    .brand-foxwar {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #f59e0b;
    }
    .brand-bridge {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #525252;
      margin-top: 1px;
    }
    .version-badge {
      margin-left: auto;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #525252;
      background: #171717;
      border: 1px solid #262626;
      padding: 2px 8px;
    }

    /* ── Cards ── */
    .card {
      background: #171717;
      border: 1px solid #262626;
      padding: 12px;
      margin-bottom: 10px;
    }
    .card-title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #525252;
      margin-bottom: 10px;
    }

    /* ── Status rows ── */
    .stat-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      border-bottom: 1px solid #1a1a1a;
    }
    .stat-row:last-of-type { border-bottom: none; }

    .dot {
      width: 6px;
      height: 6px;
      flex-shrink: 0;
    }
    .dot.ok   { background: #10b981; box-shadow: 0 0 5px #10b981; }
    .dot.warn { background: #f59e0b; box-shadow: 0 0 5px #f59e0b; }
    .dot.off  { background: #404040; }

    .stat-label { color: #737373; min-width: 140px; font-size: 12px; }
    .stat-value { color: #e5e5e5; font-size: 12px; }
    .stat-value.mono { font-family: 'Consolas', 'Cascadia Mono', monospace; font-size: 11px; }

    /* ── Form rows ── */
    .form-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .form-row:last-child { margin-bottom: 0; }

    .form-label {
      color: #737373;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      min-width: 140px;
      flex-shrink: 0;
    }

    input[type="text"] {
      flex: 1;
      background: #0a0a0a;
      border: 1px solid #404040;
      color: #e5e5e5;
      padding: 5px 8px;
      font-size: 11px;
      font-family: 'Consolas', 'Cascadia Mono', monospace;
      min-width: 0;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: #f59e0b; }

    /* ── Toggle ── */
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      cursor: pointer;
    }
    .toggle {
      position: relative;
      width: 32px;
      height: 18px;
      flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .slider {
      position: absolute;
      inset: 0;
      background: #404040;
      border-radius: 18px;
      transition: 0.2s;
      cursor: pointer;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      left: 3px;
      bottom: 3px;
      background: #a3a3a3;
      border-radius: 50%;
      transition: 0.2s;
    }
    input:checked + .slider { background: #d97706; }
    input:checked + .slider::before { background: #fff; transform: translateX(14px); }

    .toggle-label {
      font-size: 12px;
      color: #d4d4d4;
    }

    /* ── Buttons ── */
    .btn {
      padding: 5px 10px;
      border: none;
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      font-family: inherit;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: background 0.15s;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .btn-neutral {
      background: #262626;
      border: 1px solid #404040;
      color: #d4d4d4;
    }
    .btn-neutral:hover { background: #333333; }
    .btn-amber {
      background: #d97706;
      color: #000;
    }
    .btn-amber:hover { background: #f59e0b; }
    .btn-full {
      width: 100%;
      padding: 7px 10px;
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    /* ── Update card ── */
    .card-update {
      border-color: #d97706;
      border-left-width: 3px;
    }
    .update-text {
      font-size: 12px;
      color: #d4d4d4;
      margin-bottom: 4px;
    }
    .update-text b { color: #f59e0b; }
    .update-notes {
      font-size: 11px;
      color: #737373;
      max-height: 72px;
      overflow-y: auto;
      white-space: pre-wrap;
      margin-bottom: 10px;
      padding-right: 4px;
    }
    .update-error {
      font-size: 11px;
      color: #ef4444;
      margin-bottom: 10px;
      white-space: pre-wrap;
    }
    .update-progress {
      height: 6px;
      background: #262626;
      margin-bottom: 6px;
      overflow: hidden;
    }
    .update-progress-bar {
      height: 100%;
      width: 0%;
      background: #d97706;
      transition: width 0.15s linear;
    }
    .update-progress.indeterminate .update-progress-bar {
      width: 35%;
      animation: indet 1.1s infinite ease-in-out;
    }
    @keyframes indet {
      0%   { margin-left: -35%; }
      100% { margin-left: 100%; }
    }
    .update-phase {
      font-size: 11px;
      color: #a3a3a3;
      margin-bottom: 10px;
      font-variant-numeric: tabular-nums;
    }

    /* ── Separator ── */
    .sep {
      border: none;
      border-top: 1px solid #262626;
      margin: 10px 0;
    }

    /* ── Flash ── */
    #flash {
      position: fixed;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      background: #171717;
      border: 1px solid #404040;
      color: #e5e5e5;
      padding: 5px 14px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
    }
    #flash.show { opacity: 1; }
    #flash.ok   { border-color: #10b981; color: #10b981; }
    #flash.err  { border-color: #ef4444; color: #ef4444; }
  </style>
</head>
<body>

<header>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="36" height="36" style="flex-shrink:0">
    <rect width="512" height="512" rx="112" fill="#141419" />
    <g transform="translate(256, 256) scale(2.3)">
      <polygon points="0,-100 86.6,-50 86.6,50 0,100 -86.6,50 -86.6,-50" fill="#1e1e26" stroke="#2d2d38" stroke-width="6" stroke-linejoin="round" />
      <line x1="-86.6" y1="-50" x2="86.6" y2="50" stroke="#2d2d38" stroke-width="2" opacity="0.6"/>
      <line x1="86.6" y1="-50" x2="-86.6" y2="50" stroke="#2d2d38" stroke-width="2" opacity="0.6"/>
      <line x1="0" y1="-100" x2="0" y2="100" stroke="#2d2d38" stroke-width="2" opacity="0.6"/>
      <g transform="translate(0, -10) scale(1.2)">
        <polygon points="-60,-70 -20,-10 -70,30" fill="#a04000" stroke="#a04000" stroke-linejoin="round" />
        <polygon points="60,-70 20,-10 70,30" fill="#a04000" stroke="#a04000" stroke-linejoin="round" />
        <polygon points="-50,-50 -25,-10 -50,10" fill="#141419" stroke-linejoin="round" />
        <polygon points="50,-50 25,-10 50,10" fill="#141419" stroke-linejoin="round" />
        <polygon points="-30,-20 0,-30 30,-20 50,20 0,60 -50,20" fill="#d35400" stroke-linejoin="round" />
        <polygon points="-50,20 -80,40 -20,80 0,60" fill="#e67e22" stroke-linejoin="round" />
        <polygon points="50,20 80,40 20,80 0,60" fill="#e67e22" stroke-linejoin="round" />
        <polygon points="-20,80 20,80 0,110" fill="#141419" stroke-linejoin="round" />
        <polygon points="-20,80 0,60 20,80 0,90" fill="#e67e22" stroke-linejoin="round" />
        <polygon points="-40,30 -15,40 -25,45" fill="#f1c40f" />
        <polygon points="40,30 15,40 25,45" fill="#f1c40f" />
      </g>
    </g>
  </svg>
  <div class="brand-name">
    <span class="brand-foxwar">Foxwar</span>
    <span class="brand-bridge">Bridge</span>
  </div>
  <span class="version-badge" id="versionLabel">v0.1.0</span>
</header>

<!-- ÉTAT -->
<div class="card">
  <div class="card-title">État</div>

  <div class="stat-row">
    <div class="dot" id="dotWatcher"></div>
    <span class="stat-label">Surveillance</span>
    <span class="stat-value" id="statusWatcher">—</span>
  </div>
  <div class="stat-row">
    <div class="dot" id="dotPath"></div>
    <span class="stat-label">Dossier SaveGames</span>
    <span class="stat-value mono" id="statusPath">—</span>
  </div>
  <div class="stat-row">
    <div class="dot ok"></div>
    <span class="stat-label">Clients connectés</span>
    <span class="stat-value" id="statusClients">0</span>
  </div>
  <div class="stat-row">
    <div class="dot" id="dotEvent"></div>
    <span class="stat-label">Dernier événement</span>
    <span class="stat-value" id="statusLastEvent">Jamais</span>
  </div>

  <button class="btn btn-neutral btn-full" id="btnRefresh">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square">
      <path d="M1 4v6h6M23 20v-6h-6"/>
      <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/>
    </svg>
    Relire le fichier SAV
  </button>
</div>

<!-- PARAMÈTRES -->
<div class="card">
  <div class="card-title">Paramètres</div>

  <label class="toggle-row" id="toggleAutostart">
    <span class="toggle">
      <input type="checkbox" id="chkAutostart">
      <span class="slider"></span>
    </span>
    <span class="toggle-label">Lancer au démarrage de Windows</span>
  </label>

  <div class="form-row">
    <span class="form-label">Dossier SaveGames</span>
    <input type="text" id="inpPath" placeholder="C:\Users\…\SaveGames" readonly>
    <button class="btn btn-neutral" id="btnBrowse">Parcourir</button>
  </div>
</div>

<!-- MISE À JOUR (masquée tant qu'aucune version n'est disponible) -->
<div class="card card-update" id="updateCard" style="display:none">
  <div class="card-title">Mise à jour disponible</div>
  <div class="update-text">Nouvelle version <b id="updateVersion">—</b> disponible.</div>
  <div class="update-notes" id="updateNotes"></div>
  <div class="update-error" id="updateError" style="display:none"></div>
  <div class="update-progress" id="updateProgress" style="display:none">
    <div class="update-progress-bar" id="updateProgressBar"></div>
  </div>
  <div class="update-phase" id="updatePhase" style="display:none"></div>
  <button class="btn btn-amber btn-full" id="btnInstallUpdate">Télécharger et installer</button>
</div>

<div id="flash"></div>

<script>
  const invoke = window.__TAURI__.core.invoke;

  async function refreshStatus() {
    try {
      const st = await invoke('get_status');
      setDot('dotWatcher', st.watcher_active ? 'ok' : 'warn');
      document.getElementById('statusWatcher').textContent =
        st.watcher_active ? 'Active' : 'Inactif';

      setDot('dotPath', st.sav_path_exists ? 'ok' : (st.sav_path_exists === false ? 'warn' : 'off'));
      const settings = await invoke('get_settings');
      document.getElementById('statusPath').textContent = settings.sav_path ?? '(non configuré)';
      document.getElementById('inpPath').value = settings.sav_path ?? '';
      document.getElementById('chkAutostart').checked = st.autostart;

      document.getElementById('statusClients').textContent = st.client_count;

      setDot('dotEvent', st.last_event ? 'ok' : 'off');
      document.getElementById('statusLastEvent').textContent =
        st.last_event ? timeAgo(new Date(st.last_event)) : 'Jamais';
    } catch (e) {
      console.error('get_status error:', e);
    }
  }

  function setDot(id, cls) {
    document.getElementById(id).className = 'dot ' + cls;
  }

  function timeAgo(date) {
    const secs = Math.floor((Date.now() - date) / 1000);
    if (secs < 60) return `il y a ${secs}s`;
    if (secs < 3600) return `il y a ${Math.floor(secs / 60)}min`;
    return `il y a ${Math.floor(secs / 3600)}h`;
  }

  function flash(msg, type = '') {
    const el = document.getElementById('flash');
    el.textContent = msg;
    el.className = type ? `show ${type}` : 'show';
    clearTimeout(el._t);
    el._t = setTimeout(() => { el.className = ''; }, 1800);
  }

  document.getElementById('chkAutostart').addEventListener('change', async e => {
    try {
      await invoke('set_autostart', { enabled: e.target.checked });
    } catch (err) {
      e.target.checked = !e.target.checked;
      flash('Erreur : ' + err, 'err');
    }
  });

  document.getElementById('btnBrowse').addEventListener('click', async () => {
    try {
      const dir = await invoke('pick_directory');
      if (dir) {
        await invoke('set_sav_path', { path: dir });
        flash('Chemin enregistré', 'ok');
        refreshStatus();
      }
    } catch (e) { flash('Erreur : ' + e, 'err'); }
  });

  document.getElementById('btnRefresh').addEventListener('click', async () => {
    try {
      await invoke('trigger_refresh');
      flash('Fichier SAV relu', 'ok');
    } catch (e) { flash('Erreur : ' + e, 'err'); }
  });

  // ── Version (injectée au build) ───────────────────────────────────────────
  invoke('get_version')
    .then(v => { document.getElementById('versionLabel').textContent = 'v' + v; })
    .catch(() => {});

  // ── Mises à jour ──────────────────────────────────────────────────────────
  const UPDATE_INTERVAL_MS = 6 * 60 * 60 * 1000; // 6 h
  let pendingUpdateUrl = null;

  async function checkUpdate() {
    try {
      const info = await invoke('check_update');
      if (info) {
        pendingUpdateUrl = info.download_url;
        document.getElementById('updateVersion').textContent = 'v' + info.version;
        document.getElementById('updateNotes').textContent = info.notes || '';
        document.getElementById('updateCard').style.display = '';
      }
    } catch (e) {
      console.error('check_update error:', e);
    }
  }

  function fmtMo(bytes) {
    return (bytes / 1048576).toFixed(1) + ' Mo';
  }

  document.getElementById('btnInstallUpdate').addEventListener('click', async () => {
    if (!pendingUpdateUrl) return;
    const btn = document.getElementById('btnInstallUpdate');
    const err = document.getElementById('updateError');
    const prog = document.getElementById('updateProgress');
    const bar = document.getElementById('updateProgressBar');
    const phase = document.getElementById('updatePhase');

    err.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Mise à jour…';
    prog.style.display = '';
    phase.style.display = '';
    prog.classList.add('indeterminate');
    bar.style.width = '0%';
    phase.textContent = 'Préparation…';

    // Écoute la progression émise par le backend pendant le téléchargement.
    let unlisten = null;
    try {
      unlisten = await window.__TAURI__.event.listen('update://progress', (e) => {
        const p = e.payload;
        if (p.phase === 'launching') {
          prog.classList.remove('indeterminate');
          bar.style.width = '100%';
          phase.textContent = 'Lancement de l’installeur…';
        } else if (p.total) {
          prog.classList.remove('indeterminate');
          bar.style.width = p.pct.toFixed(0) + '%';
          phase.textContent = `Téléchargement… ${p.pct.toFixed(0)} % (${fmtMo(p.downloaded)} / ${fmtMo(p.total)})`;
        } else {
          prog.classList.add('indeterminate');
          phase.textContent = `Téléchargement… ${fmtMo(p.downloaded)}`;
        }
      });
    } catch (_) { /* event API indisponible : on continue sans barre */ }

    try {
      await invoke('install_update', { url: pendingUpdateUrl });
      prog.classList.remove('indeterminate');
      bar.style.width = '100%';
      phase.textContent = 'Installation… l’application va redémarrer.';
    } catch (e) {
      if (unlisten) unlisten();
      err.textContent = 'Échec : ' + e;
      err.style.display = '';
      prog.style.display = 'none';
      phase.style.display = 'none';
      btn.disabled = false;
      btn.textContent = 'Réessayer';
    }
  });

  refreshStatus();
  setInterval(refreshStatus, 3000);
  checkUpdate();
  setInterval(checkUpdate, UPDATE_INTERVAL_MS);
</script>
</body>
</html>
